# Decap CMS 設定 — 網頁後台編輯內容
#
# 目前使用 local_backend：在本機跑 `npx decap-server`（在 site/ 目錄）後，
# 打開 http://localhost:4321/admin/ 即可用網頁介面編輯，存檔直接寫進 src/content。
#
# TODO 部署後：把 backend 換成 GitHub（需要 GitHub repo），例如：
#   backend:
#     name: github
#     repo: <你的帳號>/<repo 名稱>
#     branch: main
local_backend: true
backend:
  name: git-gateway
  branch: main

locale: zh_Hant
site_url: https://helenhan.example
media_folder: site/public/uploads
public_folder: /uploads

collections:
  - name: about
    label: 個人簡介
    files:
      - file: site/src/content/about/profile.md
        name: profile
        label: 照片與自我介紹
        fields:
          - { name: name, label: 名字, widget: string }
          - { name: photo, label: 個人照片, widget: image, default: /uploads/profile-placeholder.svg }
          - { name: body, label: 自我介紹, widget: markdown }

  - name: thoughts
    label: 所思所想
    label_singular: 文章
    folder: site/src/content/thoughts
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: 標題, widget: string }
      - { name: date, label: 日期, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: category, label: 分類, widget: string, default: 隨筆 }
      - { name: description, label: 一句話摘要, widget: string, required: false }
      - { name: draft, label: 草稿（勾選則不公開）, widget: boolean, default: false }
      - { name: body, label: 內文, widget: markdown }

  - name: works
    label: 文字作品
    label_singular: 作品
    folder: site/src/content/works
    create: true
    fields:
      - { name: title, label: 標題, widget: string }
      - { name: platform, label: 刊登平台, widget: string, hint: "例如：報導者、換日線、VERSE" }
      - { name: date, label: 發表日期, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: url, label: 原文連結, widget: string, required: false }
      - { name: note, label: 一句話介紹, widget: string, required: false }
      - { name: body, label: 補充說明, widget: markdown, required: false }

  - name: experience
    label: 經歷成果
    label_singular: 經歷
    folder: site/src/content/experience
    create: true
    fields:
      - { name: title, label: 標題, widget: string }
      - { name: field, label: 領域, widget: string, hint: "例如：寫作、策展" }
      - { name: period, label: 期間, widget: string, hint: "例如：2024 – 現在" }
      - { name: order, label: 排序（小的在前）, widget: number, default: 0 }
      - { name: body, label: 說明, widget: markdown }

  - name: topics
    label: 留言板話題
    label_singular: 話題
    folder: site/src/content/topics
    create: true
    fields:
      - { name: title, label: 話題標題, widget: string }
      - { name: date, label: 日期, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: body, label: 話題內文, widget: markdown }

  - name: status
    label: 近況狀態
    label_singular: 狀態
    folder: site/src/content/status
    create: true
    fields:
      - name: kind
        label: 類型
        widget: select
        options:
          - { label: 最近在讀, value: READ }
          - { label: 最近在看, value: WATCH }
          - { label: 最近嘗試, value: TRY }
      - { name: text, label: 內容, widget: string }
      - { name: date, label: 日期, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: body, label: （不使用）, widget: hidden, required: false }
